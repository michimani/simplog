name: tagpr

on:
  push:
    branches:
      - master

jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: Songmu/tagpr@555e72cee68c09d43dc2337dc9ba890955b630da # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
